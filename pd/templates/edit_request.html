{% extends "base.html" %}

{% load i18n %}

{% block content %}
    <h1>{% trans "Заявка" %} {{ object.pk }}</h1>
    <form action="" method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <p>
            <label>{% trans "Усопший" %}</label>
            {% if object.deadman %}{{ object.deadman }}{% endif %}
            <a href="{% url create_deadman object.pk %}" class="btn">{% trans "прикрепить" %}</a>
        </p>
        <p>
            <input type="submit" class="btn" value="{% trans "Сохранить черновик" %}"/>
            <input type="submit" class="btn" name="ready" value="{% trans "Отправить на одобрение УГХ" %}"/>
        </p>
    </form>
{% endblock %}
