<script type="text/javascript">
    $(function() {
        var form = document.forms[0];
        [].slice.call( form.elements ).forEach(function(item){
            switch (item.type) {
                case 'select-one':
                case 'checkbox':
                    item.disabled = 'true';
                default:
                    item.readOnly = 'true';
            }
        });
    });
</script>
