{% load i18n %}

<h2>{% trans "Журнал" %}</h2>
<table class="table table-bordered">
    <tr>
        <th>{% trans "Дата" %}</th>
        <th>{% trans "Пользователь" %}</th>
        <th>{% trans "Действие" %}</th>
    </tr>
    {% for log in burial.get_logs %}
        <tr>
            <td>{{ log.dt }}</td>
            <td>{{ log.user.profile }} / {{ log.user.profile.org }}</td>
            <td>{{ log.msg|linebreaksbr }}</td>
        </tr>
    {% endfor %}
</table>
