{% extends "base.html" %}

{% load i18n %}

{% block content %}
    <h1>{% trans "К исполнению" %}</h1>
    <table>
        {% for b in burials %}
            <tr>
                <td>{{ b.cemetery }}</td>
                <td>{{ b.place_number|default:"" }}</td>
                <td>
                    <a class="btn" href="{% url view_request b.pk %}">{% trans "просмотр" %}</a>
                </td>
            </tr>
        {% endfor %}
    </table>

    {% if user.profile.is_loru %}
        <p>
            <a class="btn" href="{% url create_request %}">{% trans "создать заявку" %}</a>
        </p>
    {% endif %}
{% endblock %}
