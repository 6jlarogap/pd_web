{% extends "base.html" %}

{% load i18n %}

{% block content %}
    <h1>{% trans "Захоронения" %}</h1>
    <div class="row-fluid no-print">
        <div class="span12">
            <div class="row-fluid">
                <form id="mainform" class="ugh_search_burials form-horizontal" method="get" action="">
                    {{ form.as_p }}

                    <p class="buttons">
                        <input type="submit" value="{% trans "искать" %}" class="btn btn-primary" />
                        <input type="submit" value="{% trans "печать" %}" class="btn" name="print" />
                        <input type="hidden" name="sort"  value="{{ sort }}" />
                        <input type="hidden" name="page"  value="{{ page }}" />
                    </p>
                </form>
            </div>
        </div>
    </div>

    <p>{% trans "Найдено:" %} {{ paginator.count|default:0 }}</p>

    <table class="table table-bordered table-striped">
    {% include "burial_table.html" %}
    </table>

    {% include "paginator.html" %}

    {% if request.GET.print %}
        <script type="text/javascript">
            window.print();
        </script>
    {% endif %}
{% endblock %}
