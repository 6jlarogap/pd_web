<form novalidate name="add_phone">
	<h2>Добавить телефон</h2>

	<label for="phonetype">Тип:</label>

	<select ng-model="phone.phonetype" name="phonetype" ng-options="value.id as value.name for value in PHONETYPE_CHOICES"></select>
	<span class="error" ng-show="add_phone.phonetype.$error.required">Выберите тип телефона</span>
	<label for="phone_number">Номер:</label>

    <input type="text" name="phone_number" off-ui-mask="{{'+9 (999) 999-9999'}}"
       ui-validate="{validPhone : 'validatePhone($value)' }"
       ng-model="phone.number"
       required
       ng-maxlength="maxlength">
    <span ng-show="add_phone.phone_number.$error.validator">Неверный номер телефона. Введите номер в формате +страна(код)номер.</span>
	<!-- span ng-show="add_phone.phone_number.$error.phoneField">Неверный номер телефона. Введите только цифры.</span -->
	{{add_phone.phone_number.$error|json}}
	<span class="error" ng-show="add_phone.phone_number.$error.required">Укажите номер телефона</span>
	<div class="row-fluid">
		<button ng-click="save()" ng-disabled="!phone.number.length" class="btn btn-primary">
			Сохранить
		</button>
	</div>
</form>
