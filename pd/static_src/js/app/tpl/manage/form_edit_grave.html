<form novalidate name="graveEditForm" novalidate>
    <div class="modal-header">
        <h3>Изменение могилы № {{ selectedGrave.grave_number }}</h3>
    </div>
    <div class="modal-body">
        <dl class="dl-horizontal">
            <dt>Неверное ФИО:</dt>
            <dd>
                <input name="is_wrong_fio" id="id_is_wrong_fio" type="checkbox" ng-model="selectedGrave.is_wrong_fio"/>
            </dd>
            <dt>Воинская могила:</dt>
            <dd>
                <input name="is_military" id="id_is_military" type="checkbox" ng-model="selectedGrave.is_military"/>
            </dd>
        </dl>
    </div>
    <div class="modal-footer">
        <button class="btn btn-primary" ng-disabled="loading || !graveEditForm.$valid" ng-click="saveGraveEditForm(graveEditForm)">
            сохранить
        </button>
        <button class="btn cancel" ng-click="closeEditForm('isGraveEditOpen')">Отменить</button>
    </div>
</form>
