<form name="graveAddForm" novalidate>
    <div class="modal-header">
        <h3>Добавление могилы</h3>
    </div>
    <div class="modal-body">
        <dl class="dl-horizontal">
            <dt>Номер могилы:</dt>
            <dd>
               {{ newGrave.grave_number }} 
            
                <!-- input name="graveNumber" id="id_new_grave_number" type="number" ng-model="newGrave.grave_number"
                       required maxlength="255" disabled="disabled" required
                       min="1" max="{{max_grave_number+1}}"/ -->
                <span class="error" ng-show="graveAddForm.graveNumber.$error.required">Не указан номер могилы</span>
            </dd>
            <dt>Широта:</dt>
            <dd>
                {{newGrave.lat||'-'}}
                <!--input disabled="disabled" name="graveLatitude" id="id_new_grave_latitude" type="text" ng-model="newGrave.lat" maxlength="255"/-->
            </dd>
            <dt>Долгота:</dt>
            <dd>
                {{newGrave.lng||'-'}}
                <!--input disabled="disabled" name="graveLongitude" id="id_new_grave_longitude" type="text" ng-model="newGrave.lng" maxlength="255"/-->
            </dd>
            <dt>Неверное ФИО:</dt>
            <dd>
                <input name="is_wrong_fio" id="id_is_wrong_fio" type="checkbox" ng-model="newGrave.is_wrong_fio"/>
            </dd>
            <dt>Воинская могила:</dt>
            <dd>
                <input name="is_military" id="id_is_military" type="checkbox" ng-model="newGrave.is_military"/>
            </dd>
        </dl>
    </div>
    <div class="modal-footer">
        <button class="btn btn-primary" ng-disabled="loading || !graveAddForm.$valid" ng-click="addGrave(graveAddForm)">
            Добавить
        </button>
        <button class="btn cancel" ng-click="closeEditForm('isGraveAddOpen')">Закрыть</button>
    </div>
</form>
