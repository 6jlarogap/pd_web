<div class="row-fluid">
	<label for="id_area_set-0-name">Название участка:</label>
	<input required	name="area_name" type="text" ng-model="area.name" maxlength="255"/>
	<span class="error" ng-show="areaEditForm.area_name.$error.required">Не указано название участка</span>
</div>
<div class="row-fluid">
	<label for="id_area_set-0-availability">Открытость:</label>
	<select ng-model="area.availability">
		<option value="open">Открыт</option>
		<option value="old_only">Только подзахоронения</option>
		<option value="closed">Закрыт</option>
	</select>
</div>
<div class="row-fluid">
	<label for="id_area_set-0-purpose">Назначение:</label>
	<select ng-model="area.purpose" ng-options="value.id as value.name for value in PURPOSE_LIST">
	</select>
</div>
<div class="row-fluid">
	<label for="id_area_set-0-places_count">Кол-во могил в месте:</label>
	<input type="number" name="places_count" required ng-model="area.places_count"/>
	<span class="error" ng-show="areaEditForm.places_count.$error.required">Не указано колличество мест</span>
</div>
